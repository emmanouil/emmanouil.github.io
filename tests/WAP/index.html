<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Display</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .event {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .loading {
            text-align: center;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <h1>Event List</h1>
    <div id="loading" class="loading">Loading events...</div>
    <div id="events" class="grid"></div>

    <script>
        function fetchEvents() {
            const proxyUrl = 'https://cors-anywhere.herokuapp.com/'; // Example proxy URL
            const apiUrl = 'https://api.example.com/events'; // Replace with your API endpoint
            const loadingElement = document.getElementById('loading');
            const eventsElement = document.getElementById('events');

            loadingElement.style.display = 'block'; // Show loading state

            fetch(proxyUrl + apiUrl)
                .then(response => response.json())
                .then(data => {
                    loadingElement.style.display = 'none'; // Hide loading state
                    data.events.forEach(event => {
                        const eventDiv = document.createElement('div');
                        eventDiv.className = 'event';
                        eventDiv.innerHTML = `<h2>${event.title}</h2><p>${event.description}</p>`;
                        eventsElement.appendChild(eventDiv);
                    });
                })
                .catch(error => {
                    loadingElement.innerText = 'Failed to load events.';
                    console.error('Error fetching events:', error);
                });
        }

        window.onload = fetchEvents; // Fetch events on load
    </script>

</body>
</html>
